# Offline Throughput Benchmark
name: "offline-benchmark"
version: "1.0"
type: "offline"

model_params:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 1024

datasets:
  - name: "perf-test"
    type: "performance"
    path: "tests/datasets/dummy_1k.pkl"
    format: "pkl"
    samples: 1000
    parser:
      prompt: "text_input"

settings:
  runtime:
    min_duration_ms: 60000 # 1 minutes
    max_duration_ms: 180000 # 3 minutes
    scheduler_random_seed: 42 # For Poisson/distribution sampling
    dataloader_random_seed: 42 # For dataset shuffling

  load_pattern:
    type: "max_throughput"

  client:
    workers: 4
    max_concurrency: -1 # -1 = unlimited

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoint: "http://localhost:8000"
  api_key: null
