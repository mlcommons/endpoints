name: concurrency_benchmark
type: online  # Test type: offline, online, eval, submission | options: offline, online, eval, submission
model_params:
  name: '<MODEL_NAME eg: meta-llama/Llama-3.1-8B-Instruct>'
datasets:  # Dataset configs
- name: perf
  type: performance  # Dataset purpose: performance or accuracy | options: performance, accuracy
  path: '<DATASET_PATH eg: tests/assets/datasets/dummy_1k.jsonl>'  # Dataset file path
  parser:  # Column remapping: {prompt: <col>, system: <col>}
    prompt: text_input
settings:
  runtime:
    n_samples_to_issue: null  # Sample count override
  timeouts:  # All global durations and deadlines (see config/timeouts.py)
    min_duration_ms: 600000  # Minimum duration of the whole performance phase in ms (drives sample-count math)
    max_duration_ms: 0  # Maximum duration of the whole performance phase in ms (0 for no limit; never bounds warmup/accuracy)
  load_pattern:
    type: concurrency  # Load pattern type | options: max_throughput, poisson, concurrency, agentic_inference, burst, step
    target_concurrency: 32  # Concurrent requests
endpoint_config:
  endpoints:  # Endpoint URL(s). Must include scheme, e.g. 'http://host:port'.
  - http://localhost:8000
