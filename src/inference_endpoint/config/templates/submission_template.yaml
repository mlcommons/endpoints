# Official Submission Template
name: "llama-2-70b-submission"
version: "1.0"
type: "submission"
benchmark_mode: "offline" # Required for submission: "offline" or "online"

# Baseline configuration (locking handled by ruleset)
baseline:
  model: "llama-2-70b"
  ruleset: "mlperf-inference-v6.0"

model_params:
  temperature: 0.7
  top_k: 50
  top_p: 0.9
  max_new_tokens: 2048
  osl_distribution:
    type: "normal"
    mean: 1000
    std: 200
    min: 512
    max: 2048

# Combined performance + accuracy datasets
datasets:
  - name: "performance-test"
    type: "performance"
    path: "datasets/openorca.pkl"
    format: "pkl"
    samples: 5000

  - name: "gpqa-accuracy"
    type: "accuracy"
    path: "datasets/gpqa.pkl"
    format: "pkl"
    samples: 500
    eval_method: "exact_match"

  - name: "aime-accuracy"
    type: "accuracy"
    path: "datasets/aime.pkl"
    format: "pkl"
    samples: 300
    eval_method: "exact_match"

settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    max_duration_ms: 1800000 # 30 minutes
    scheduler_random_seed: 42 # For Poisson/distribution sampling
    dataloader_random_seed: 42 # For dataset shuffling

  load_pattern:
    type: "max_throughput"
    target_qps: 100

  client:
    workers: 4

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"
    - "accuracy"

endpoint_config:
  endpoint: "http://localhost:8000"
  api_key: null
  api_type: "openai" # Options: openai or sglang
