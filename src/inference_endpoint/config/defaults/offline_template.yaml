# Offline Throughput Benchmark
name: "offline-benchmark"
version: "1.0"
type: "offline"

model_params:
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 1024

datasets:
  - name: "perf-test"
    type: "performance"
    path: "datasets/openorca.pkl"
    format: "pkl"
    samples: 1000

settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    max_duration_ms: 1800000 # 30 minutes
    random_seed: 42

  load_pattern:
    type: "max_throughput"

  client:
    workers: 4
    max_concurrency: 32

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoint: "http://localhost:8000"
  api_key: null
