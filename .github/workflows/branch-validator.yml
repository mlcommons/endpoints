name: Branch Name Validator

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        uses: actions/github-script@v7
        with:
          script: |
            const { head } = context.payload.pull_request;
            const branchName = head.ref;

            // Branch naming patterns
            const validPatterns = [
              /^feature\/.+/,           // feature/component-name
              /^bugfix\/.+/,            // bugfix/issue-description
              /^hotfix\/.+/,            // hotfix/critical-fix
              /^docs\/.+/,              // docs/documentation-update
              /^test\/.+/,              // test/testing-improvements
              /^refactor\/.+/,          // refactor/code-improvement
              /^chore\/.+/,             // chore/maintenance-tasks
              /^release\/.+/,           // release/version-number
            ];

            // Check if branch name matches any valid pattern
            const isValidBranch = validPatterns.some(pattern => pattern.test(branchName));

            if (!isValidBranch) {
              const validExamples = [
                'feature/load-generator',
                'bugfix/connection-timeout',
                'hotfix/critical-memory-leak',
                'docs/api-documentation',
                'test/performance-benchmarks',
                'refactor/query-lifecycle',
                'chore/dependency-update',
                'release/v1.0.0'
              ];

              core.setFailed(`
                ❌ Invalid branch name: "${branchName}"

                Branch names must follow one of these patterns:
                ${validExamples.map(ex => `- ${ex}`).join('\n')}

                Current branch "${branchName}" does not match any valid pattern.
              `);
            } else {
              console.log(`✅ Branch name "${branchName}" is valid`);
            }
