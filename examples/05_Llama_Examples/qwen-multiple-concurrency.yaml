# Online Benchmark
name: "online-qwen2_5_0_5b_instruct-cnn-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "Qwen/Qwen2.5-0.5B-Instruct" # Path to the model
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 128

datasets:
  - name: cnn_dailymail::llama3_8b
    type: "performance"
    parser:
      input: prompt

settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    max_duration_ms: 3600000 # 60 minutes (Arbitrary here, and doesn't have counterpart in legacy loadgen)
    scheduler_random_seed: 137 # For Poisson/distribution sampling
    dataloader_random_seed: 111 # For dataset shuffling (Will be updated after rng seeds are finalized for submission)
    # n_samples_to_issue: 1000

  load_pattern:
    type: "concurrency"
    target_concurrency: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048]

  client:
    #workers: 4 # Number of client workers
    max_connections: 25000
    warmup_connections: true

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoints:
    - "http://localhost:30000"
  api_key: null

report_dir: logs/qwen2_5_0_5b_instruct_cnn_online_multiple_concurrency_17FEB26/
