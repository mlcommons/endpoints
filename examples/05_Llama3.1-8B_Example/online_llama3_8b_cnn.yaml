# Online Benchmark
name: "online-llama3.1-8b-cnn-benchmark"
version: "1.0"
type: "online"

model_params:
  name: "/data/model/Llama-3.1-8B-Instruct-autoround-w4g-1-iters512-xpu/" # Path to the model
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 128

datasets:
  - name: "Dataset" # TODO(attafosu): Change name to be consistent registered datasets
    type: "accuracy"
    path: "data/cnn_dailymail_validation.jsonl" # Path to the dataset. Note: This should be the file generated with download_cnndm.py
    samples: 13368
    parser:
      input: prompt
    eval_method: "rouge"
    accuracy_config:
      eval_method: "rouge"
      ground_truth: "highlights"
      extractor: identity_extractor
      num_repeats: 1
  - name: "cnn_dailymail"
    type: "performance"
    path: "data/cnn_dailymail_validation.jsonl" # Path to the dataset. Note: This should be the file generated with download_cnndm.py
    samples: 13368
    parser:
      input: prompt

settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    max_duration_ms: 3600000 # 60 minutes (Arbitrary here, and doesn't have counterpart in legacy loadgen)
    scheduler_random_seed: 137 # For Poisson/distribution sampling
    dataloader_random_seed: 111 # For dataset shuffling (Will be updated after rng seeds are finalized for submission)
    n_samples_to_issue: 13368

  load_pattern:
    type: "concurrency"
    target_concurrency: 128

  client:
    workers: 4 # Number of client workers

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoint: "http://localhost:8000"
  api_key: null

report_dir: logs/llama3_8b_cnn_online
