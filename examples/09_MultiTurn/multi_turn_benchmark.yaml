name: "multi-turn-customer-support"
version: "1.0"
type: "online"

model_params:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  temperature: 0.7
  max_new_tokens: 256

datasets:
  - name: customer_support_conversations
    type: performance
    path: examples/multi_turn/customer_support_conversations.jsonl
    format: jsonl
    samples: 10
    multi_turn:
      enabled: true
      mode: parallel
      turn_timeout_s: 300.0

settings:
  runtime:
    min_duration_ms: 60000
    max_duration_ms: 300000

  load_pattern:
    type: multi_turn
    # target_concurrency: 32  # Optional: limit concurrent requests across all conversations

  client:
    workers: 4

metrics:
  collect:
    - throughput
    - latency
    - ttft
    - tpot

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: openai

report_dir: logs/multi_turn_test
