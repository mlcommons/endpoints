# Offline Benchmark - Qwen3-VL-235B-A22B on Shopify Product Catalogue
# MLPerf Inference Q3VL benchmark: multimodal product taxonomy classification
name: "offline-qwen3-vl-235b-a22b-shopify-benchmark"
version: "1.0"
type: "offline"

model_params:
  name: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  top_p: 1
  max_new_tokens: 150

datasets:
  - name: shopify_product_catalogue::q3vl
    type: "performance"
  - name: shopify_product_catalogue::q3vl
    type: "accuracy"
    accuracy_config:
      eval_method: "shopify_category_f1"
      ground_truth: "ground_truth_category"
      extractor: "identity_extractor"
      num_repeats: 1

settings:
  runtime:
    scheduler_random_seed: 42 # For Poisson/distribution sampling
    dataloader_random_seed: 42 # For dataset shuffling

  timeouts:
    min_duration_ms: 600000 # 10 minutes, this is override when n_samples_to_issue is set
    warmup_drain_timeout_s: 240.0 # Warmup drain timeout in seconds (None = wait indefinitely)
    performance_drain_timeout_s: null # Performance drain timeout in seconds (None = wait indefinitely)
    accuracy_drain_timeout_s: null # Accuracy drain timeout in seconds (None = wait indefinitely)

  load_pattern:
    type: "max_throughput"

  client:
    num_workers: 5
    transport:
      type: zmq
      recv_buffer_size: 16777216
      send_buffer_size: 16777216
    max_connections: 1000
    # Increase timeout for slow worker startup (spawn, imports). Default 60s may be too short.
    worker_initialization_timeout: 120
  warmup:
    enabled: true # Enable warmup phase before performance run
    n_requests: 1600 # Warmup request count (None = full dataset once)
    salt: false

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_key: null

report_dir: results/qwen3_vl_235b_a22b_shopify_benchmark_offline/
