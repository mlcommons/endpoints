# Online (Server) Benchmark - Qwen3-VL-235B-A22B on Shopify Product Catalogue
name: "online-qwen3-vl-235b-a22b-shopify-benchmark"
version: "1.0"
type: "online"
timeout: 14400

model_params:
  name: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  temperature: 0
  top_p: 1
  max_new_tokens: 150
  streaming: "on" # Required for TTFT/TPOT measurement

datasets:
  - name: shopify_product_catalogue::q3vl
    type: "performance"

settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    n_samples_to_issue: 48289 # Full dataset size for this benchmark; lower this (e.g., 1000 or 100) for quick tests, or remove for an unconstrained full run
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "poisson"
    target_qps: 6.5

  client:
    num_workers: 2
    transport:
      type: zmq
      recv_buffer_size: 16777216
      send_buffer_size: 16777216
    max_connections: 1000
    # Increase timeout for slow worker startup (spawn, imports). Default 40s may be too short.
    worker_initialization_timeout: 120

metrics:
  collect:
    - "latency"
    - "ttft"

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_key: null

report_dir: results/qwen3_vl_235b_a22b_shopify_benchmark_online/
