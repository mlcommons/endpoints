# Online Latency Benchmark - Qwen3-VL-235B-A22B on Shopify Product Catalogue
# MLPerf Inference Q3VL benchmark: multimodal product taxonomy classification
name: "online-qwen3-vl-235b-a22b-shopify-benchmark"
version: "1.0"
type: "submission"
benchmark_mode: "online"

model_params:
  name: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  temperature: 0
  top_p: 1
  max_new_tokens: 1024

datasets:
  - name: shopify_product_catalogue::q3vl
    type: "performance"

settings:
  runtime:
    min_duration_ms: 60000 # 1 minute
    max_duration_ms: 600000 # 10 minutes
    scheduler_random_seed: 42 # For Poisson/distribution sampling
    dataloader_random_seed: 42 # For dataset shuffling

  load_pattern:
    type: "max_throughput"
    target_qps: 10

  client:
    workers: 4

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_key: null

report_dir: results/qwen3_vl_235b_a22b_shopify_benchmark_mlperf/
