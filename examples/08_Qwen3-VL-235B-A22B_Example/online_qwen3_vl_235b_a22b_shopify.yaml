# Online (Server) Benchmark - Qwen3-VL-235B-A22B on Shopify Product Catalogue
# MLPerf Inference Q3VL server scenario: measures latency under sustained QPS load
# GB300-NVL4 target: 41.5 QPS
name: "online-qwen3-vl-235b-a22b-shopify-benchmark"
version: "1.0"
type: "online"
timeout: 14400

model_params:
  name: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  temperature: 0
  top_p: 1
  max_new_tokens: 150
  streaming: "on" # Required for TTFT/TPOT measurement

datasets:
  - name: shopify_product_catalogue::q3vl
    type: "performance"


settings:
  runtime:
    min_duration_ms: 600000 # 10 minutes
    n_samples_to_issue: 48289 # Limit queries for testing (remove or increase for full run)
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "poisson"
    target_qps: 41.5 # GB300-NVL4 server scenario target QPS

  client:
    workers: 2
    # ZMQ IPC buffers (bytes). Default 4MB; increase for large multimodal payloads (e.g. 16777216 = 16MB).
    zmq_recv_buffer_bytes: 16777216
    zmq_send_buffer_bytes: 16777216
    # Cap connections to avoid overwhelming server. Default -1 uses ~25k (ephemeral ports),
    # causing warmup failures and connection timeouts. 256-512 is typical for vLLM.
    max_connections: 1000
    # Increase timeout for slow worker startup (spawn, imports). Default 40s may be too short.
    worker_initialization_timeout: 120

metrics:
  collect:
    - "latency"

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_key: null

report_dir: results/qwen3_vl_235b_a22b_shopify_benchmark_mlperf/
