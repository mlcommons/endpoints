# Representative-subset variant of offline_deepseek_r1_accuracy.yaml - a
# stratified ~385-sample slice (proportional across the 5 subsets) that finishes
# in well under an hour on a single GB200x4, vs many hours for the full 4388.
# Build the subset first:
#   python examples/10_DeepSeekR1_Example/prepare_dataset.py --subset 385
#
# Same prompt-fidelity + scoring notes as the full config. Because it's
# proportional, the aggregate exact_match tracks the official sample-weighted
# metric (golden FP32 = 81.3582; pass >= 80.5246).

name: "offline-deepseek-r1-fp4-accuracy-subset"
version: "1.0"
type: "offline"

model_params:
  name: "deepseek_r1-torch-fp4" # must match trtllm-serve's registered model id
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 20480
  streaming: "on"

datasets:
  - name: deepseek_r1_perf
    type: "performance"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_perf_tiny.parquet
  - name: deepseek_r1_accuracy
    type: "accuracy"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_eval_subset.parquet
    accuracy_config:
      eval_method: deepseek_r1
      ground_truth: ground_truth
      num_repeats: 1
      extras:
        subset_column: dataset
        question_column: question
        tokenizer_path: "${MODEL_DIR}" # set MODEL_DIR to the DeepSeek-R1 FP4 checkpoint dir

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 0
    scheduler_random_seed: 42
    dataloader_random_seed: 42
  load_pattern:
    type: "max_throughput"
  client:
    num_workers: 4
    max_connections: 64
    warmup_connections: 0
    min_required_connections: 0
    worker_initialization_timeout: 300.0

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: "openai_completions"
  api_key: null

report_dir: logs/deepseek_r1_fp4_accuracy_subset
