# trtllm-serve --extra_llm_api_options for DeepSeek-R1 FP4 on 8 GPUs
# (2x GB200x4 nodes, TP=8). This is the MLPerf-validated GB200 "dep8" Offline
# (in-flight-batching) config - the model card's reference deploy is TP=8 with
# attention-DP on 8xB200. Used for the full 4388-sample run (8 GPUs ~halve the
# single-node wall time).

backend: pytorch
tensor_parallel_size: 8
pipeline_parallel_size: 1
moe_expert_parallel_size: 8
max_batch_size: 512
max_num_tokens: 4608
max_seq_len: 23140
print_iter_log: true
enable_iter_perf_stats: true
return_perf_metrics: true
enable_layerwise_nvtx_marker: false
enable_chunked_prefill: false
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: false
enable_attention_dp: true
moe_config:
  backend: CUTEDSL
cuda_graph_config:
  enable_padding: true
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128, 256, 384, 512]
# NOTE: the team's dep8 config includes a cache_transceiver_config for
# disaggregated (ctx/gen) serving. This is a single IFB endpoint, so it is
# omitted - leaving it in triggers a cacheTransBuffer maxNumTokens%tokensPerBlock
# assertion at executor init.
attention_dp_config:
  enable_balance: true
  batching_wait_iters: 10
  timeout_iters: 500
