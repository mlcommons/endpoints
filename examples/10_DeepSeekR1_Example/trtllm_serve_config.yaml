# trtllm-serve --extra_llm_api_options for DeepSeek-R1 FP4 on a single GB200x4
# node (4 GPUs / 4 ranks). Adapted from the team's proven GB200 DeepSeek-R1
# 4-rank (dep4) config, with the disaggregation-specific cache_transceiver and
# MTP speculative-decoding sections removed for a standalone IFB server.
#
# TP=4 with expert-parallel MoE and attention data-parallel is the 4-rank
# layout for this checkpoint family (the model card's reference deploy is TP=8
# on 8xB200; this is the 4-GPU analogue). The nvfp4_gemm_config + CUTEDSL MoE
# backend select the NVFP4 kernels/weight-load path for the quantized weights.

backend: pytorch
tensor_parallel_size: 4
moe_expert_parallel_size: 4
pipeline_parallel_size: 1
enable_attention_dp: true
max_batch_size: 256
max_num_tokens: 4608
max_seq_len: 23140
print_iter_log: true
enable_iter_perf_stats: true
cuda_graph_config: null
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.85
  dtype: fp8
moe_config:
  backend: CUTEDSL
nvfp4_gemm_config:
  allowed_backends:
    - cutlass
    - cublaslt
    - cutedsl
    - cuda_core
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
