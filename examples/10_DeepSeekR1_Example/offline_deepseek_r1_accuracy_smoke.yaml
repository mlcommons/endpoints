# SMOKE variant of offline_deepseek_r1_accuracy.yaml - a small, fast subset to
# validate the live chain (server -> openai_completions adapter -> events ->
# deepseek_r1 scorer) before committing to the full 4388-sample run. Not an
# official accuracy number (truncated sample set + shorter max_new_tokens).

name: "offline-deepseek-r1-fp4-accuracy-smoke"
version: "1.0"
type: "offline"

model_params:
  # Served model id = the checkpoint dir basename trtllm-serve registers.
  name: "${SERVED_MODEL_NAME:-deepseek_r1-torch-fp4-v2}"
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 4096
  streaming: "on"

datasets:
  - name: deepseek_r1_perf
    type: "performance"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_eval.parquet
    samples: 24
  - name: deepseek_r1_accuracy
    type: "accuracy"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_eval.parquet
    samples: 24
    accuracy_config:
      eval_method: deepseek_r1
      ground_truth: ground_truth
      num_repeats: 1
      extras:
        subset_column: dataset
        question_column: question
        tokenizer_path: "${MODEL_DIR}" # set MODEL_DIR to the DeepSeek-R1 FP4 checkpoint dir

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 0
    n_samples_to_issue: 24
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "max_throughput"

  client:
    num_workers: -1

endpoint_config:
  endpoints:
    - "http://localhost:8000"
  api_type: "openai_completions"
  api_key: null

report_dir: logs/deepseek_r1_fp4_accuracy_smoke
