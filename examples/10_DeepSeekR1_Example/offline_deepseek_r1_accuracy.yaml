# Offline MLPerf accuracy benchmark for DeepSeek-R1 (FP4, ModelOpt) on
# TensorRT-LLM. Run with `--mode acc` to score only; `--mode both` to also
# capture offline throughput.
#
# Prompt fidelity: the dataset parquet carries `input_tokens` (the exact MLPerf
# pre-tokenized prompt). With api_type=openai_completions, those token IDs are
# POSTed to /v1/completions verbatim - the Harmonize() transform is a no-op and
# the server chat template is bypassed, so the model sees the exact MLPerf
# prompt. The raw generation (including the <think> trace) is scored as-is.
#
# Accuracy is the official MLCommons combined-subset eval (math500 / aime /
# gpqa / mmlu_pro / livecodebench) via the `deepseek_r1` scorer, which shells
# out to the isolated subproject at src/inference_endpoint/evaluation/deepseek_r1/.
# Golden FP32 exact_match =
# 81.3582; pass threshold = 99% of golden (>= 80.5246). tokens_per_sample
# golden = 3886.2274 (pass band 90-110%).
#
# NOTE: this is the full 4388-sample set - a multi-hour run on a single GB200x4.
# For a quick representative estimate use offline_deepseek_r1_accuracy_subset.yaml.

name: "offline-deepseek-r1-fp4-accuracy"
version: "1.0"
type: "offline"

model_params:
  # MUST match trtllm-serve's registered model id, which is the checkpoint dir's
  # basename. With launch_and_run.sh defaulting to the loadable
  # `deepseek_r1-torch-fp4` checkpoint, that id is `deepseek_r1-torch-fp4`.
  name: "deepseek_r1-torch-fp4"
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 20480 # MLPerf DeepSeek-R1 max output sequence length
  streaming: "on"

datasets:
  # Performance entry: required by the loader. Kept tiny so --mode acc doesn't
  # waste time on a perf phase (the perf phase still runs in acc mode).
  - name: deepseek_r1_perf
    type: "performance"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_perf_tiny.parquet

  - name: deepseek_r1_accuracy
    type: "accuracy"
    path: examples/10_DeepSeekR1_Example/data/deepseek_r1_eval.parquet
    accuracy_config:
      eval_method: deepseek_r1
      ground_truth: ground_truth
      num_repeats: 1
      extras:
        subset_column: dataset
        question_column: question
        # Tokenizer for tokens_per_sample. Any DeepSeek-R1 checkpoint dir works
        # (loaded from disk); does not need to be the served checkpoint. Set
        # MODEL_DIR in the environment to your checkpoint path before running.
        tokenizer_path: "${MODEL_DIR}"

settings:
  runtime:
    min_duration_ms: 0
    max_duration_ms: 0 # no cap: reasoning outputs are long; issue the full set
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "max_throughput"

  client:
    # Tuned for a REMOTE endpoint (client on the login node, server on a compute
    # node). warmup/min_required MUST be 0 - auto would pre-open thousands of
    # connections at init and blow the worker-init timeout. max_connections sets
    # the concurrency: match the server's max_batch_size (256 here) to saturate
    # it. Keep num_workers small (4) - more workers (8) made worker init time
    # out importing the package over a shared FS. Lower max_connections if the
    # login->compute link is slow.
    num_workers: 4
    max_connections: 256
    warmup_connections: 0
    min_required_connections: 0
    worker_initialization_timeout: 300.0

endpoint_config:
  # For the cross-arch flow, run_client.sh substitutes the server's host here.
  endpoints:
    - "http://localhost:8000"
  api_type: "openai_completions"
  api_key: null

report_dir: logs/deepseek_r1_fp4_accuracy
