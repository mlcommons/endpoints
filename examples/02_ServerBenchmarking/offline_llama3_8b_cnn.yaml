# Offline Throughput Benchmark
name: "offline-llama3-8b-cnn-benchmark"
version: "1.0"
type: "offline"

model_params:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 1024

datasets:
  - name: "perf-test"
    type: "performance"
    path: "cnn_dailymail_train.json"
    samples: 1000
    parser:
      prompt: "article"

settings:
  runtime:
    min_duration_ms: 6000 # 6 seconds
    max_duration_ms: 60000 # 1 minute
    scheduler_random_seed: 137 # For Poisson/distribution sampling
    dataloader_random_seed: 111 # For dataset shuffling

  load_pattern:
    type: "max_throughput"

  client:
    workers: 4

metrics:
  collect:
    - "throughput"
    - "latency"
    - "ttft"
    - "tpot"

endpoint_config:
  endpoint: "http://localhost:8000"
  api_key: null
