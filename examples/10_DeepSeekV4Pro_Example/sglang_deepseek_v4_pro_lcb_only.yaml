name: "deepseek-v4-pro-sglang-lcb"
version: "1.0"
type: "offline"
# 72h wall-clock budget: LCB is 1055 problems x 4 repeats with 320k-token
# reasoning, so it is a multi-day run at the KV-safe concurrency.
timeout: 259200

model_params:
  # Must match the model id served by SGLang (see GET /v1/models).
  name: "/data/workloads-inference/models/DeepSeek-V4-Pro"
  temperature: 1.0
  max_new_tokens: 320000
  top_k: -1
  top_p: 1.0
  streaming: "on"

datasets:
  - name: "perf-stub"
    type: "performance"
    path: "examples/10_DeepSeekV4Pro_Example/data/perf_stub.jsonl"
    samples: 1
    parser:
      prompt: "text_input"
  - name: "livecodebench::deepseek_v4"
    type: "accuracy"
    accuracy_config:
      eval_method: "code_bench_scorer"
      extractor: "python_code_extractor"
      num_repeats: 4

settings:
  runtime:
    min_duration_ms: 100
    max_duration_ms: 0
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "max_throughput"

  client:
    # LCB reasoning averages ~167k tokens/seq; the ~8M-token KV pool only fits
    # ~48 such sequences (crashed at 48). 32 keeps KV near ~66% with margin.
    num_workers: 32
    worker_initialization_timeout: 600.0

  warmup:
    enabled: false

  drain:
    metrics_drain_timeout_s: 900.0
    metrics_tokenizer_workers: 8

endpoint_config:
  endpoints:
    - "http://127.0.0.1:30000"
  api_key: null
  api_type: "openai"

report_dir: "results/sglang_deepseek_v4_pro_lcb/"
