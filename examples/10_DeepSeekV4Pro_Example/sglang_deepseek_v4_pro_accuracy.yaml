name: "deepseek-v4-pro-sglang-accuracy"
version: "1.0"
type: "offline"
# Wall-clock CLI budget (seconds) for the full multi-phase run (GPQA + AIME + LCB).
timeout: 86400

model_params:
  # Must match the model id served by SGLang (see GET /v1/models).
  name: "/data/workloads-inference/models/DeepSeek-V4-Pro"
  temperature: 1.0
  max_new_tokens: 88000
  top_k: -1
  top_p: 1.0
  streaming: "on"

datasets:
  - name: "perf-stub"
    type: "performance"
    path: "examples/10_DeepSeekV4Pro_Example/data/perf_stub.jsonl"
    samples: 1
    parser:
      prompt: "text_input"
  - name: "aime25::deepseek_v4"
    type: "accuracy"
    accuracy_config:
      eval_method: "pass_at_1"
      ground_truth: "answer"
      extractor: "boxed_math_extractor"
      num_repeats: 8
  - name: "gpqa::deepseek_v4"
    type: "accuracy"
    accuracy_config:
      eval_method: "pass_at_1"
      extractor: "abcd_extractor"
      ground_truth: "ground_truth"
      num_repeats: 5
  - name: "livecodebench::deepseek_v4"
    type: "accuracy"
    accuracy_config:
      eval_method: "code_bench_scorer"
      extractor: "python_code_extractor"
      num_repeats: 3

settings:
  runtime:
    min_duration_ms: 100
    max_duration_ms: 0
    scheduler_random_seed: 42
    dataloader_random_seed: 42

  load_pattern:
    type: "max_throughput"

  client:
    num_workers: 64
    # Large worker counts + cold model can exceed the default 60s init budget.
    worker_initialization_timeout: 600.0

  warmup:
    enabled: false

  drain:
    metrics_drain_timeout_s: 900.0
    metrics_tokenizer_workers: 8

endpoint_config:
  endpoints:
    - "http://127.0.0.1:30000"
  api_key: null
  api_type: "openai"

report_dir: "results/sglang_deepseek_v4_pro_accuracy/"
