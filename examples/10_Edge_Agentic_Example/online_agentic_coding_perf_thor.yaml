# Agentic coding performance benchmark — edge device (with online accuracy check)
#
# Replays recorded multi-turn agentic-coding trajectories (SWE-bench-style) as a
# *performance* workload (throughput / TTFT / TPOT) against the same served
# endpoint used for BFCL v4 accuracy, and runs an inline "online checker" that
# scores the replayed trajectories against the recorded tool calls in the
# dataset (multi_turn.inline_accuracy). The dataset is therefore both the
# performance workload and its own ground truth.
#
# Each recorded conversation is replayed turn by turn: the recorded user/tool
# turns are issued to the endpoint and the model generates each assistant
# response (use_dataset_history=True — recorded assistant/tool history is fed
# back so every turn sees the original context). At finalization the inline
# scorer reads the run's event log + this dataset and writes scores.json.
#
# Scenario: single-stream (target_concurrency 1) — the honest measurement for an
# edge endpoint served single-slot (llama.cpp -np 1). The 8-conversation subset
# is sized to complete one pass in a ~30-45 min edge window.
#
# Run (start the edge server first; see README.md):
#   inference-endpoint benchmark from-config \
#     --config online_agentic_coding_perf.yaml
#
# Pair this with the BFCL v4 accuracy runs (see README.md) for a combined
# accuracy + performance picture on the same endpoint.
name: "agentic-coding-perf"
version: "1.0"
type: "online"

model_params:
  name: "Qwen3.6-27B-Q4_K_M" # replace with your served model name
  # Deterministic decoding so the inline accuracy check is reproducible and
  # matches the edge accuracy setup. Reasoning is disabled server-side
  # (llama-server --reasoning off), as in the BFCL v4 accuracy runs.
  temperature: 0
  seed: 42
  max_new_tokens: 1024

datasets:
  - name: agentic_coding
    type: performance
    # 8 recorded agentic-coding conversations (265 generated turns), selected as
    # the smallest trajectories from the 16-conversation set so one single-stream
    # pass fits a ~30-45 min edge window. Swap in agentic_coding_16.jsonl (or a
    # larger subset from datasets/) for a longer, more representative window.
    path: examples/10_Edge_Agentic_Example/agentic_coding_2_thor.jsonl
    multi_turn:
      # Per-turn deadline; a timeout aborts that turn and the rest of its
      # conversation. 10 min is generous for slow edge decode.
      turn_timeout_s: 600.0
      # Online checker: score generated tool calls vs the recorded ones.
      inline_accuracy: true
      # One pass over the 8-conversation subset (no trajectory repeats).
      num_trajectories_to_issue: 2

settings:
  runtime:
    min_duration_ms: 0
    # Safety cap (1h) so the run stays within an edge budget even if decode is
    # slower than expected; one pass should finish in ~30-45 min.
    max_duration_ms: 3600000
  load_pattern:
    type: multi_turn
    # Single-stream: one in-flight conversation at a time. This matches a
    # single-slot edge server (llama.cpp -np 1). Raise only when pointing at a
    # multi-slot endpoint.
    target_concurrency: 1
  client:
    num_workers: 1
    max_connections: 1
    warmup_connections: 0

endpoint_config:
  endpoints:
    - "http://localhost:8080"
  api_type: openai

report_dir: results/agentic_coding_perf_thor/
